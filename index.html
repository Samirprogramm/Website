<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberSec — Research & Tools</title>

<style>
/* ------------------------------
   GLOBAL DESIGN SYSTEM
--------------------------------*/
:root {
    --bg: #0a0c0f;
    --card: #111418;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --accent: #3b82f6;        /* Professionelles Blau */
    --accent-dark: #2563eb;
    --border: #1f2429;
    --radius: 12px;
    --shadow: 0 8px 30px rgba(0,0,0,0.45);
    --font: 'Inter', system-ui, sans-serif;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
}

/* ------------------------------
   LAYOUT
--------------------------------*/
.wrapper {
    max-width: 1200px;
    margin: auto;
    padding: 30px;
    display: grid;
    grid-template-columns: 240px 1fr 320px;
    gap: 30px;
}

@media (max-width: 900px) {
    .wrapper {
        grid-template-columns: 1fr;
    }
}

/* ------------------------------
   SIDEBAR
--------------------------------*/
.sidebar {
    background: var(--card);
    padding: 25px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
}

.logo {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 25px;
    letter-spacing: 1px;
}

.sidebar a {
    display: block;
    color: var(--muted);
    text-decoration: none;
    padding: 8px 0;
    font-size: 15px;
}

.sidebar a:hover {
    color: var(--accent);
}

/* ------------------------------
   CONTENT
--------------------------------*/
.content {
    display: flex;
    flex-direction: column;
    gap: 30px;
}

.hero {
    background: var(--card);
    padding: 40px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
}

.hero h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.hero p {
    color: var(--muted);
    font-size: 18px;
}

/* ------------------------------
   PRODUCT GRID
--------------------------------*/
.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 25px;
}

.product {
    background: var(--card);
    padding: 22px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    transition: 0.25s;
}

.product:hover {
    transform: translateY(-6px);
    border-color: var(--accent);
    box-shadow: 0 12px 40px rgba(0,0,0,0.55);
}

.product h3 {
    margin: 0 0 8px;
}

.price {
    color: var(--accent);
    font-weight: 700;
    margin-top: 5px;
}

.btn {
    margin-top: 14px;
    padding: 12px 14px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    color: white;
    width: 100%;
    font-size: 15px;
}

.btn:hover {
    background: var(--accent-dark);
}

/* ------------------------------
   CART
--------------------------------*/
.cart {
    background: var(--card);
    padding: 25px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
}

.cart h2 {
    margin-top: 0;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
}

.cart-total {
    margin-top: 20px;
    font-size: 18px;
    font-weight: 700;
}

/* ------------------------------
   MODAL (TWINT)
--------------------------------*/
.modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal {
    background: var(--card);
    padding: 30px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    width: 350px;
    text-align: center;
}

.modal img {
    width: 220px;
    background: white;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">CyberSec</div>
        <a href="#">Blog</a>
        <a href="#">Research</a>
        <a href="#">Tools</a>
        <a href="#">Shop</a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="hero">
            <h1>Cybersecurity Research</h1>
            <p>Professionelle Tools, Hardware und Guides für Ethical Hacking.</p>
        </div>

        <div class="products" id="products"></div>

    </div>

    <!-- CART -->
    <div class="cart">
        <h2>Warenkorb</h2>
        <div id="cart-items"></div>
        <div class="cart-total" id="cart-total">CHF 0.00</div>
        <button class="btn" id="checkout">Mit TWINT bezahlen</button>
    </div>

</div>

<!-- TWINT MODAL -->
<div class="modal-bg" id="modal-bg">
    <div class="modal">
        <h3>TWINT Zahlung</h3>
        <img id="qr" src="">
        <p>Scanne den QR‑Code mit TWINT.</p>
        <button class="btn" onclick="closeModal()">Schliessen</button>
    </div>
</div>

<script>
/* ------------------------------
   PRODUCTS
--------------------------------*/
const products = [
    { id: 1, name: "ESP32 Dev Kit", price: 19.90 },
    { id: 2, name: "WiFi Testing Kit", price: 49.90 },
    { id: 3, name: "Pentesting Lab", price: 29.90 }
];

let cart = [];

/* Render products */
const productContainer = document.getElementById("products");
products.forEach(p => {
    productContainer.innerHTML += `
        <div class="product">
            <h3>${p.name}</h3>
            <div class="price">CHF ${p.price.toFixed(2)}</div>
            <button class="btn" onclick="addToCart(${p.id})">In den Warenkorb</button>
        </div>
    `;
});

/* ------------------------------
   CART
--------------------------------*/
function addToCart(id) {
    const product = products.find(p => p.id === id);
    cart.push(product);
    updateCart();
}

function updateCart() {
    const cartItems = document.getElementById("cart-items");
    const total = document.getElementById("cart-total");

    cartItems.innerHTML = "";
    let sum = 0;

    cart.forEach(item => {
        sum += item.price;
        cartItems.innerHTML += `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>CHF ${item.price.toFixed(2)}</span>
            </div>
        `;
    });

    total.innerText = "CHF " + sum.toFixed(2);
}

/* ------------------------------
   TWINT MOCK CHECKOUT
--------------------------------*/
document.getElementById("checkout").onclick = async () => {
    const res = await fetch("/create-payment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ items: cart })
    });

    const data = await res.json();

    document.getElementById("qr").src = data.qrImage;
    document.getElementById("modal-bg").style.display = "flex";
};

function closeModal() {
    document.getElementById("modal-bg").style.display = "none";
}
</script>

</body>
</html>
